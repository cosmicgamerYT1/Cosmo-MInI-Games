<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo Mini Games</title>
    <style>
        /* General Styles */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #111;
            color: white;
            height: 100%;
            overflow-x: hidden;
        }

        /* Top Navigation */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            background-color: #222;
            border-bottom: 1px solid #333;
            position: relative;
            z-index: 10;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            letter-spacing: 1px;
        }
        .top-btn {
            background-color: #fff;
            color: #111;
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        .top-btn:hover {
            background-color: #ddd;
        }

        /* Auth Container (Sign In / Sign Up) */
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: calc(100vh - 60px);
            background-color: #181818;
        }
        .auth-box {
            background-color: #232527;
            padding: 30px;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .auth-box h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            font-size: 20px;
            letter-spacing: 0.5px;
        }
        .input-group {
            margin-bottom: 15px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            margin-bottom: 5px;
            color: #aaa;
        }
        .input-group input, .input-group select {
            width: 100%;
            padding: 12px;
            background-color: #111;
            border: 1px solid #444;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: #fff;
            outline: none;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background-color: #fff;
            color: #111;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .submit-btn:hover {
            background-color: #ddd;
        }

        /* Home Page Styles */
        .home-container {
            display: none; /* Controlled by JS */
            height: calc(100vh - 60px);
        }
        .sidebar {
            width: 220px;
            background-color: #222;
            padding: 20px;
            border-right: 1px solid #333;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .sidebar-links a {
            display: block;
            color: #ccc;
            text-decoration: none;
            padding: 12px 10px;
            font-weight: bold;
            border-radius: 4px;
            margin-bottom: 5px;
        }
        .sidebar-links a:hover {
            background-color: #333;
            color: #fff;
        }
        .logout-btn {
            color: #ff5252 !important;
            border: 1px solid #ff5252;
            text-align: center;
        }
        .logout-btn:hover {
            background-color: #ff5252 !important;
            color: #fff !important;
        }
        .main-content {
            flex-grow: 1;
            padding: 30px;
            overflow-y: auto;
            background-color: #111;
        }
        .user-welcome {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 25px;
            color: #fff;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
            margin-top: 20px;
        }
        .game-card {
            background-color: #222;
            border-radius: 6px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #333;
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .game-thumbnail {
            width: 100%;
            height: 150px;
            background-color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .game-info {
            padding: 12px;
        }
        .game-title {
            font-weight: bold;
            font-size: 15px;
            margin-bottom: 6px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .game-rating {
            font-size: 12px;
            color: #00e676;
            font-weight: bold;
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
</head>
<body>

    <div class="top-nav">
        <div class="logo">COSMO MINI GAMES</div>
        <div id="nav-action-area">
            <button class="top-btn" id="toggle-auth-btn" onclick="toggleAuthMode()">Sign In</button>
        </div>
    </div>

    <div id="signup-page" class="auth-container">
        <div class="auth-box">
            <h2>SIGN UP AND START PLAYING!</h2>
            <div class="input-group">
                <label>Birthday</label>
                <input type="date" id="signup-bday">
            </div>
            <div class="input-group">
                <label>Full Name</label>
                <input type="text" placeholder="Your Name" id="signup-name">
            </div>
            <div class="input-group">
                <label>Username</label>
                <input type="text" placeholder="Don't use your real name" id="signup-username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="At least 8 characters" id="signup-password">
            </div>
            <div class="input-group">
                <label>Gender (Optional)</label>
                <select id="signup-gender">
                    <option value="">Select...</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <button class="submit-btn" onclick="handleSignUp()">Sign Up</button>
        </div>
    </div>

    <div id="signin-page" class="auth-container" style="display: none;">
        <div class="auth-box">
            <h2>Login to Cosmo Mini Games</h2>
            <div class="input-group">
                <label>Username or Name</label>
                <input type="text" placeholder="Username" id="signin-username">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Password" id="signin-password">
            </div>
            <button class="submit-btn" onclick="handleSignIn()">Log In</button>
        </div>
    </div>

    <div id="home-page" class="home-container">
        <div class="sidebar">
            <div class="sidebar-links">
                <a href="#">🏠 Home</a>
                <a href="#">👤 Profile</a>
                <a href="#">💬 Messages</a>
                <a href="#">👥 Friends</a>
                <a href="#">👕 Avatar</a>
                <a href="#">🎒 Inventory</a>
                <a href="#">⚙️ Settings</a>
            </div>
            <div class="sidebar-links">
                <a href="#" class="logout-btn" onclick="handleLogOut()">🚪 Log Out</a>
            </div>
        </div>
        <div class="main-content">
            <div id="welcome-message" class="user-welcome">Hello, Player!</div>
            <h3>Recommended For You</h3>
            <div class="games-grid">
                <div class="game-card">
                    <div class="game-thumbnail">🍋</div>
                    <div class="game-info"><div class="game-title">Sell Lemons Tycoon</div><div class="game-rating">👍 95%</div></div>
                </div>
                <div class="game-card">
                    <div class="game-thumbnail">⚔️</div>
                    <div class="game-info"><div class="game-title">Cosmo Fruits</div><div class="game-rating">👍 92%</div></div>
                </div>
                <div class="game-card">
                    <div class="game-thumbnail">🚪</div>
                    <div class="game-info"><div class="game-title">Space Doors</div><div class="game-rating">👍 89%</div></div>
                </div>
                <div class="game-card">
                    <div class="game-thumbnail">🔫</div>
                    <div class="game-info"><div class="game-title">Cosmo Rivals</div><div class="game-rating">👍 94%</div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyCpKcmOI_nR5K3ngsTclg1OncpzDKBKpPQ",
            authDomain: "cosmo-mini-games.firebaseapp.com",
            databaseURL: "https://cosmo-mini-games-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "cosmo-mini-games",
            storageBucket: "cosmo-mini-games.firebasestorage.app",
            messagingSenderId: "45560615745",
            appId: "1:45560615745:web:c82033cd4fca04962a07c0",
            measurementId: "G-SNF1W3YHK7"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // --- 2. CHECK LOGIN SESSION ON LOAD ---
        window.addEventListener('DOMContentLoaded', () => {
            const savedUsername = localStorage.getItem('cosmoSessionUser');
            if (savedUsername) {
                showHomePage(savedUsername);
            }
        });

        // --- 3. PAGE NAVIGATION LOGIC ---
        let isSignUpMode = true;

        function toggleAuthMode() {
            const signupPage = document.getElementById('signup-page');
            const signinPage = document.getElementById('signin-page');
            const toggleBtn = document.getElementById('toggle-auth-btn');

            if (isSignUpMode) {
                signupPage.style.display = 'none';
                signinPage.style.display = 'flex';
                toggleBtn.innerText = 'Sign Up';
                isSignUpMode = false;
            } else {
                signinPage.style.display = 'none';
                signupPage.style.display = 'flex';
                toggleBtn.innerText = 'Sign In';
                isSignUpMode = true;
            }
        }

        function showHomePage(username) {
            // FIXED THE TYPO HERE (.style.style removed)
            document.getElementById('signup-page').style.display = 'none';
            document.getElementById('signin-page').style.display = 'none';
            document.getElementById('nav-action-area').style.display = 'none';
            document.getElementById('welcome-message').innerText = `Hello, ${username}!`;
            document.getElementById('home-page').style.display = 'flex';
            
            localStorage.setItem('cosmoSessionUser', username);
        }

        function handleLogOut() {
            localStorage.removeItem('cosmoSessionUser');
            window.location.reload();
        }

        // --- 4. DATABASE AUTH LOGIC ---
        
        // SIGN UP FUNCTION
        function handleSignUp() {
            const bday = document.getElementById('signup-bday').value;
            const name = document.getElementById('signup-name').value.trim();
            const username = document.getElementById('signup-username').value.trim();
            const password = document.getElementById('signup-password').value;
            const gender = document.getElementById('signup-gender').value;

            if(!username || !password || !name) {
                alert("Please fill out your Name, Username, and Password!");
                return;
            }

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    alert("This username is already taken!");
                } else {
                    database.ref('users/' + username).set({
                        birthday: bday,
                        fullName: name,
                        password: password,
                        gender: gender
                    }).then(() => {
                        alert("Account registered successfully!");
                        showHomePage(username);
                    }).catch((error) => {
                        alert("Registration failed: " + error.message);
                    });
                }
            });
        }

        // SIGN IN FUNCTION
        function handleSignIn() {
            const username = document.getElementById('signin-username').value.trim();
            const password = document.getElementById('signin-password').value;

            if(!username || !password) {
                alert("Please fill in all fields!");
                return;
            }

            database.ref('users/' + username).once('value').then((snapshot) => {
                if (snapshot.exists()) {
                    const userData = snapshot.val();
                    if (userData.password === password) {
                        alert("Welcome back!");
                        showHomePage(username);
                    } else {
                        alert("Incorrect password!");
                    }
                } else {
                    alert("Username not found!");
                }
            }).catch((error) => {
                alert("Error: " + error.message);
            });
        }
    </script>
</body>
</html>
